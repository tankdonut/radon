[tool.ruff]
target-version = "py39"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "B", "I"]
ignore = ["E501"]  # line length handled separately

[tool.ruff.lint.isort]
known-first-party = ["utils", "trade_blotter"]

[tool.pytest.ini_options]
markers = [
    "integration: live tests hitting real MenthorQ (requires credentials)",
]

