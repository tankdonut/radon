<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tweet: {{TICKER}} | {{DATE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0f14;
      color: #e2e8f0;
      font-size: 14px;
      line-height: 1.6;
    }
    .page { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 16px;
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .page-subtitle {
      font-size: 11px;
      color: #475569;
      margin-top: 2px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr 600px;
      gap: 32px;
      align-items: start;
    }

    @media (max-width: 1000px) {
      .layout { grid-template-columns: 1fr; }
    }

    /* Tweet text panel */
    .tweet-panel {
      background: #0f1519;
      border: 1px solid #1e293b;
      border-radius: 4px;
      padding: 24px;
      position: sticky;
      top: 24px;
    }
    .tweet-panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .tweet-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #475569;
    }

    .copy-btn {
      background: #05AD98;
      color: #0a0f14;
      border: none;
      padding: 6px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      border-radius: 4px;
      transition: all 150ms;
    }
    .copy-btn:hover { opacity: 0.9; }
    .copy-btn.copied {
      background: #048A7A;
    }

    .tweet-text {
      font-size: 15px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-wrap: break-word;
      color: #e2e8f0;
    }

    .tweet-text .cashtag {
      color: #4A9EEA;
      font-weight: 500;
    }

    .tweet-chars {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: #475569;
    }
    .tweet-chars .over { color: #E85D6C; }

    /* Card preview section */
    .card-section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #475569;
      margin-bottom: 12px;
    }

    .card-actions {
      display: flex;
      gap: 12px;
      margin-top: 12px;
    }

    .action-btn {
      background: transparent;
      border: 1px solid #1e293b;
      color: #94a3b8;
      padding: 6px 12px;
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 150ms;
    }
    .action-btn:hover {
      border-color: #05AD98;
      color: #05AD98;
    }

    .copy-img-btn {
      background: #4A9EEA; color: #0a0f14; border: none; padding: 6px 14px;
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer;
      border-radius: 4px; transition: all 150ms;
    }
    .copy-img-btn:hover { opacity: 0.9; }
    .copy-img-btn.copied { background: #357ABD; }
  </style>
</head>
<body>
  <div class="page">

    <div class="page-header">
      <div>
        <div class="page-title">Tweet Preview — {{TICKER}}</div>
        <div class="page-subtitle">Generated {{DATE}} · Copy text and screenshot card for X post</div>
      </div>
    </div>

    <div class="layout">

      <!-- LEFT: Tweet text -->
      <div class="tweet-panel">
        <div class="tweet-panel-header">
          <div class="tweet-label">Tweet Copy</div>
          <button class="copy-btn" onclick="copyTweet()">COPY TEXT</button>
        </div>
        <div class="tweet-text" id="tweet-text">{{TWEET_TEXT_HTML}}</div>
        <div class="tweet-chars" id="tweet-chars"></div>
      </div>

      <!-- RIGHT: Card image -->
      <div>
        <div class="card-section-label" style="display:flex; justify-content:space-between; align-items:center;">
          <span>Infographic Card — Right-click to copy or use button</span>
          <button class="copy-img-btn" onclick="copyImage()">COPY IMAGE</button>
        </div>
        <img id="card-img" src="{{CARD_DATA_URI}}" alt="{{TICKER}} Trade Infographic" style="width:600px; border:1px solid #1e293b; border-radius:4px; display:block; cursor:pointer;" />
        <div class="card-actions">
          <a class="action-btn" href="{{CARD_FILE}}" target="_blank">Open Card HTML ↗</a>
          <a class="action-btn" href="{{CARD_DATA_URI}}" download="{{TICKER}}-trade-{{DATE}}.png">Download PNG ↓</a>
        </div>
      </div>

    </div>

  </div>

  <script>
    // Raw tweet text for copying (no HTML)
    const rawTweet = `{{TWEET_TEXT_RAW}}`;

    function copyTweet() {
      navigator.clipboard.writeText(rawTweet).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✓ COPIED';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'COPY TEXT';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    async function copyImage() {
      const btn = document.querySelector('.copy-img-btn');
      try {
        const img = document.getElementById('card-img');
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
        await navigator.clipboard.write([
          new ClipboardItem({ 'image/png': blob })
        ]);
        btn.textContent = '✓ COPIED';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'COPY IMAGE';
          btn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        btn.textContent = '⚠ RIGHT-CLICK IMG';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'COPY IMAGE';
          btn.classList.remove('copied');
        }, 3000);
      }
    }

    // Character count
    const charEl = document.getElementById('tweet-chars');
    const len = rawTweet.length;
    charEl.innerHTML = `${len} characters` + (len > 280 ? ` <span class="over">(${len - 280} over limit — use as thread)</span>` : ` (single tweet ✓)`);
  </script>
</body>
</html>
